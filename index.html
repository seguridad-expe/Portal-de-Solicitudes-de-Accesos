<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud de Accesos | Experimentality</title>

    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/index.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>

    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <div class="logo-placeholder">[ ] EXPERIMENTALITY</div>
            <h2>Portal de Solicitudes</h2>
            <p>Acceso exclusivo con cuenta corporativa.</p>
            <div id="loginError" class="login-error" style="display: none;"></div>
            <button id="googleSignInBtn" class="btn-google" onclick="Auth.signIn()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" height="20"
                    alt="Google">
                Iniciar sesión con Google
            </button>
        </div>
    </div>

    <div id="userBadge" class="user-badge" style="display: none;">
        <img id="userAvatar" src="" alt="Avatar" class="avatar">
        <span id="userName" class="user-name"></span>
        <button onclick="Auth.signOut()" class="btn-logout">Salir</button>
    </div>

    <div class="container" style="margin-top: 40px;">
        <header>
            <h1>🔐 Portal de Solicitud de Accesos</h1>
            <p>Selecciona el aplicativo y justifica tu necesidad de acceso.</p>
        </header>

        <form id="form-solicitud" class="form-section">
            
            <div class="form-group">
                <label for="nombreUsuario">Nombre Completo:</label>
                <input type="text" id="nombreUsuario" required readonly
                    placeholder="Se autocompleta con tu cuenta Google">
            </div>

            <div class="form-group">
                <label for="correoUsuario">Correo Corporativo:</label>
                <input type="email" id="correoUsuario" required readonly
                    placeholder="Se autocompleta con tu cuenta Google">
            </div>

            <div class="form-group">
                <label for="tipoAcceso">Tipo de Acceso:</label>
                <select id="tipoAcceso" required>
                    <option value="Interno" selected>🏠 Interno (Experimentality)</option>
                    <option value="Externo">🌐 Externo (Cliente)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="clienteNombre">Cliente / Proyecto:</label>
                <input type="text" id="clienteNombre" required placeholder="Ej: Éxito, Sura, D1 o Experimentality">
            </div>

            <div class="form-group">
                <label for="selectAplicativo">Aplicativo al que solicitas acceso:</label>
                <select id="selectAplicativo" required>
                    <option value="" disabled selected>Selecciona una opción...</option>
                    <option value="AWS">AWS</option>
                    <option value="GCP">Google Cloud Platform (GCP)</option>
                    <option value="GitHub">GitHub</option>
                    <option value="VTEX">VTEX</option>
                    <option value="Teams">Microsoft Teams</option>
                    <option value="Otro">Otro (Especificar...)</option>
                </select>
            </div>

            <div id="grupo-otro-aplicativo" class="form-group" style="display: none; margin-top: 10px;">
                <label for="otroAplicativo">Especifica el aplicativo:</label>
                <input type="text" id="otroAplicativo" placeholder="Ej: Jira, Figma, Adobe, etc.">
            </div>

            <div id="grupo-correo-responsable" class="form-group" style="display: none; margin-top: 10px;">
                <label for="correoResponsableManual">Correo del Responsable del Acceso:</label>
                <input type="email" id="correoResponsableManual" placeholder="responsable@cliente.com o lider@experimentality.co">
                <small style="color: #888; display: block; margin-top: 5px;">Ingresa el correo de la persona que debe recibir la notificación para crearlo.</small>
            </div>

            <div class="form-group">
                <label for="justificacion">Justificación (¿Para qué proyecto o tarea lo necesitas?):</label>
                <textarea id="justificacion" rows="4" required
                    placeholder="Necesito acceso para desplegar la nueva funcionalidad del cliente X..."></textarea>
            </div>

            <button type="submit" class="btn-submit" id="btn-enviar">Enviar Solicitud</button>
        </form>

        <div id="mensaje-estado" style="display: none; margin-top: 20px; padding: 15px; border-radius: 5px;"></div>
    </div>

    <script src="js/env.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/solicitudes.js"></script>
</body>

</html>
